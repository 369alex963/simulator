# KERNELiOS — nginx site config for Cloudways
# Replace YOURAPP and yourdomain.com with real values.
# Drop this file at /etc/nginx/sites-available/kernelios and symlink to sites-enabled/.

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # SSL — managed by Cloudways Let's Encrypt one-click
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Recommended TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy same-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Proxy headers forwarded to all upstream apps
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
    proxy_http_version 1.1;

    # ── Django API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Django admin ────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 120s;
    }

    # ── Django static files ─────────────────────────────────────────────────
    # WhiteNoise (CompressedManifestStaticFilesStorage) serves static files
    # directly from gunicorn with far-future Cache-Control headers — no nginx
    # rule needed.  Uncomment the block below only if you want nginx to serve
    # staticfiles/ directly (marginally faster, but requires re-running
    # collectstatic before reloading nginx):
    #
    # location /static/ {
    #     alias /var/www/YOURAPP/new-version/backend/staticfiles/;
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    # }

    # ── Media files (brand-kit logos, favicons) ─────────────────────────────
    # Served by nginx directly — bypasses gunicorn entirely.
    location /media/ {
        alias /var/www/YOURAPP/new-version/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Next.js frontend (catch-all) ────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # WebSocket support (Next.js HMR in dev; keep for safety in prod)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Upload size limit (match Django DATA_UPLOAD_MAX_MEMORY_SIZE = 5 MiB)
    client_max_body_size 6M;
}

# ── HTTP -> HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}
